<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Wheelie{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='modals.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="preload" as="image" href="{{ url_for('static', filename='assets/imgs/fsquare_icon.png') }}">
    <link rel="preload" as="image" href="{{ url_for('static', filename='assets/imgs/rent_icon.png') }}">
    <link rel="preload" as="image" href="{{ url_for('static', filename='assets/imgs/current_rent.png') }}">
    <link rel="preload" as="image" href="{{ url_for('static', filename='assets/imgs/bike_icon.png') }}">
    <link rel="preload" as="image" href="{{ url_for('static', filename='assets/imgs/person_icon.png') }}">
    <link rel="preload" as="image" href="{{ url_for('static', filename='assets/imgs/payments_icon.png') }}">
</head>

<body>
    <div class="home-screen">
      
        <div class="sidebar" expand="{{ 'true' if sidebar_expanded else 'false' }}">
            <img class="sidebar-logo" src="{{url_for('static', filename='assets/imgs/Logo_mini.png') }}" alt="sidebar icon">
            <div class="nav-indicator"></div>

           <div class="nav-items">
                <a href="{{ url_for('home') }}"                    
                    class="nav-item" data-route="home">
                    <img src="{{ url_for('static', filename='assets/imgs/fsquare_icon.png') }}"   alt="Dashboard">
                    <span>Dashboard</span>
                </a>
                <a href="{{ url_for('rentals.rentals') }}"         
                    class="nav-item" data-route="rentals.rentals">
                    <img src="{{ url_for('static', filename='assets/imgs/current_rent.png') }}"     alt="Rentals">
                    <span>Rentals</span>
                </a>
                <a href="{{ url_for('bikes.registry') }}"          
                    class="nav-item" data-route="bikes.registry">
                    <img src="{{ url_for('static', filename='assets/imgs/bike_icon.png') }}"       alt="Bikes">
                    <span>Bikes</span>
                </a>
                <a href="{{ url_for('customers.customers') }}"     
                    class="nav-item" data-route="customers.customers">
                    <img src="{{ url_for('static', filename='assets/imgs/person_icon.png') }}"   alt="Customers">
                    <span>Customers</span>
                </a>
                <a href="{{ url_for('payments.payments') }}"      
                    class="nav-item" data-route="payments.payments">
                    <img src="{{ url_for('static', filename='assets/imgs/payments_icon.png') }}"    alt="Payments">
                    <span>Payments</span>
                </a>
                {% if is_admin %}
                <a href="{{ url_for('staff.staff_list') }}" 
                    class="nav-item" data-route="staff.staff_list">
                    <img src="{{ url_for('static', filename='assets/imgs/staff_icon.png') }}" alt="Staff">
                    <span>Staff</span>
                </a>
                <a href="{{ url_for('activity.activity_log') }}" 
                    class="nav-item" data-route="activity.activity_log">
                    <img src="{{ url_for('static', filename='assets/imgs/log_icon.png') }}" alt="Activity Log">
                    <span>Activity Log</span>
                </a>
                {% endif %}
            </div>

            <div class="logout-section">
                <a href="{{ url_for('logout') }}" 
                    class="logout-btn" data-route="logout">
                    <img src="{{ url_for('static', filename='assets/imgs/logout_icon.png') }}" alt="Logout">
                    <span>Logout</span>
                </a>
            </div>
        </div>

        <div class="main-content">
            {% block content %}{% endblock %}
        </div>
    </div>

   <script>
      document.addEventListener('DOMContentLoaded', function() { // sidebar state logic / highlighting thing
        const sidebar = document.querySelector('.sidebar');
        const navItems = document.querySelectorAll('.nav-item, .nav-item-top');
        const logoutBtn = document.querySelector('.logout-btn');
        const navIndicator = document.querySelector('.nav-indicator');

        function setSidebarCookie(state) {
            document.cookie = `sidebarState=${state};path=/;max-age=31536000`;
        }

        function updateIndicator() {
            const currentRoute = window.location.pathname;
            let activeItem = null;

            navItems.forEach(item => {
                const href = item.getAttribute('href');
                const isActive = href === currentRoute || 
                                (href !== '/' && currentRoute.startsWith(href));

                if (isActive) {
                    activeItem = item;
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });

            if (activeItem && navIndicator) {
                const navItemsEl = document.querySelector('.nav-items');
                navIndicator.style.top = ((navItemsEl.offsetTop * 0.9) + activeItem.offsetTop) + 'px';
                navIndicator.style.height = activeItem.offsetHeight + 'px';
            }
        }

        navItems.forEach(item => {
            item.addEventListener('click', function() {
                sidebar.setAttribute('expand', 'true');
                setSidebarCookie('expanded');
              
            });
        });

        if (logoutBtn) {
            logoutBtn.addEventListener('click', function() {
                sidebar.setAttribute('expand', 'true');
                setSidebarCookie('expanded');
            });
        }

        sidebar.addEventListener('click', function(event) {
            if (event.target !== sidebar) { return; }
            if (sidebar.getAttribute('expand') === 'true') {
                sidebar.setAttribute('expand', 'false');
                setSidebarCookie('collapsed');
            } else {
                sidebar.setAttribute('expand', 'true');
                setSidebarCookie('expanded');
            }
            updateIndicator();
        });

        document.addEventListener('click', function(event) {
            if (sidebar.contains(event.target)) { return; }
            if (sidebar.getAttribute('expand') === 'true') {
                sidebar.setAttribute('expand', 'false');
                setSidebarCookie('collapsed');
            }
        });

        const images = sidebar.querySelectorAll('img');
        let loaded = 0;
        if (images.length === 0) {
            updateIndicator();
        } else {
            images.forEach(img => {
                if (img.complete) {
                    loaded++;
                    if (loaded === images.length) updateIndicator();
                } else {
                    img.addEventListener('load', () => {
                        loaded++;
                        if (loaded === images.length) updateIndicator();
                    });
                }
            });
        }

        const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function closethatbar() {
            await wait(200)
            
            if (sidebar.getAttribute('expand') === 'true') {
                sidebar.setAttribute('expand', 'false');
                setSidebarCookie('collapsed');
            }
        }
        closethatbar();
    });
    </script>

    {% block extra_scripts %}{% endblock %}

    <script src="{{ url_for('static', filename='modals.js') }}"></script>
