{% extends "base.html" %}

{% block title %}Wheelie - {% if rental %}Edit{% else %}New{% endif %} Rental{% endblock %}

{% block content %}

<div class="modal fade" id="rentalFormModal" tabindex="-1" aria-labelledby="rentalFormModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="rentalFormModalLabel">{% if rental %}Edit Rental{% else %}Create New Rental{% endif %}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form method="post" id="rentalForm">
                    <div class="mb-3">
                        <label for="customer_id" class="form-label">Customer</label>
                        <select class="form-select" id="customer_id" name="customer_id" required>
                            <option value="">Select Customer...</option>
                            {% for customer in customers %}
                            <option value="{{ customer['customer_id'] }}">{{ customer['first_name'] }} {{ customer['last_name'] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="bike_id" class="form-label">Bike</label>
                        <select class="form-select" id="bike_id" name="bike_id" required>
                            <option value="">Select Bike...</option>
                            {% for bike in bikes %}
                            <option value="{{ bike['bike_id'] }}" data-rate="{{ bike['bike_rate'] }}">{{ bike['bike_code'] }} - {{ bike['brand'] }} {{ bike['model'] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="rental_rate_display" class="form-label">Hourly Rate (₱)</label>
                        <input type="text" class="form-control" id="rental_rate_display" name="rental_rate_display" readonly>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="rentalForm" class="btn btn-primary">Create Rental</button>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const rentalModal = new bootstrap.Modal(document.getElementById('rentalFormModal'));
        rentalModal.show();

        const rateField = document.getElementById('rental_rate_display');
        document.getElementById('bike_id').addEventListener('change', function() {
            const selected = this.options[this.selectedIndex];
            rateField.value = selected ? selected.dataset.rate || '' : '';
        });

        document.getElementById('rentalFormModal').addEventListener('hidden.bs.modal', function() {
            window.location.href = '{{ url_for("rentals.rentals") }}';
        });
    });
</script>
{% endblock %}
