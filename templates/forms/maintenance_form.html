{% extends "base.html" %}

{% block title %}Wheelie - {% if maintenance %}Edit{% else %}New{% endif %} Maintenance{% endblock %}

{% block content %}

<div class="modal fade" id="maintenanceFormModal" tabindex="-1" aria-labelledby="maintenanceFormModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="maintenanceFormModalLabel">{% if maintenance %}Edit Maintenance{% else %}New Maintenance Record{% endif %}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form method="post" id="maintenanceForm">
                    <div class="mb-3">
                        <label for="bike_id" class="form-label">Bike</label>
                        <select class="form-select" id="bike_id" name="bike_id" required>
                            <option value="">Select Bike...</option>
                            {% for bike in bikes %}
                            <option value="{{ bike['bike_id'] }}">{{ bike['bike_code'] }} - {{ bike['brand'] }} {{ bike['model'] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="maintenance_date" class="form-label">Maintenance Date</label>
                        <input type="date" class="form-control" id="maintenance_date" name="maintenance_date" required>
                    </div>
                    <div class="mb-3">
                        <label for="maintenance_type" class="form-label">Maintenance Type</label>
                        <select class="form-select" id="maintenance_type" name="maintenance_type" required>
                            <option value="routine" {% if maintenance and maintenance['maintenance_type'] == 'routine' %}selected{% endif %}>Routine</option>
                            <option value="repair" {% if maintenance and maintenance['maintenance_type'] == 'repair' %}selected{% endif %}>Repair</option>
                            <option value="inspection" {% if maintenance and maintenance['maintenance_type'] == 'inspection' %}selected{% endif %}>Inspection</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3" required>{% if maintenance %}{{ maintenance['description'] }}{% endif %}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="outcome" class="form-label">Outcome</label>
                        <select class="form-select" id="outcome" name="outcome" required>
                            <option value="resolved" {% if maintenance and maintenance['outcome'] == 'resolved' %}selected{% endif %}>Resolved</option>
                            <option value="parts_needed" {% if maintenance and maintenance['outcome'] == 'parts_needed' %}selected{% endif %}>Parts Needed</option>
                            <option value="retired" {% if maintenance and maintenance['outcome'] == 'retired' %}selected{% endif %}>Retired</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="maintenanceForm" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const maintenanceModal = new bootstrap.Modal(document.getElementById('maintenanceFormModal'));
        maintenanceModal.show();

        document.getElementById('maintenanceFormModal').addEventListener('hidden.bs.modal', function() {
            window.location.href = '{{ url_for("maintenance.maintenance") }}';
        });
    });
</script>
{% endblock %}
